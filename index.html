<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comment Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* ベース:ダークグレー */
    --bg:#0f1115;
    --bg-2:#13161c;
    --panel:#161a21;
    --panel-2:#1b2027;
    --elevated:#1e242d;
    --ink:#e6eaf0;
    --ink-dim:#aab3c0;
    --muted:#6b7585;
    --muted-2:#4d5562;
    --line:#262c36;
    --line-soft:#1f242d;
    --line-strong:#333b48;
    /* 青系アクセント */
    --accent:#4c8dff;
    --accent-bright:#6ba1ff;
    --accent-dim:#2f4a7a;
    --accent-glow:rgba(76,141,255,.16);
    --accent-soft:#1a2536;
    --sel:#16243a;
    --sel-line:#3d7bd6;
    --ok:#3fb6a8;
    --warn:#e0a85c;
    --row-h:44px;
    --r:10px;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; height:100%; }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(76,141,255,.06), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(76,141,255,.045), transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:"Hanken Grotesk","Noto Sans JP",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; font-size:14px;
    display:flex; flex-direction:column; height:100vh; height:100dvh; overflow:hidden;
    overscroll-behavior:none;
    letter-spacing:.005em;
  }
  ::selection { background:var(--accent-glow); }

  /* スクロールバー */
  ::-webkit-scrollbar { width:11px; height:11px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#2a313c; border-radius:8px; border:3px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background:#39424f; }

  header.app {
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px 22px; background:rgba(19,22,28,.7); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line); flex-shrink:0; z-index:20;
  }
  header.app h1 {
    font-size:17px; margin:0; letter-spacing:-.01em; font-weight:700; color:var(--ink);
    display:flex; align-items:center; gap:10px; flex-shrink:0;
  }
  .head-main { display:flex; align-items:center; gap:14px; min-width:0; }
  header.app h1::before {
    content:""; width:8px; height:8px; border-radius:50%;
    background:var(--accent); box-shadow:0 0 0 4px var(--accent-glow), 0 0 12px var(--accent);
  }
  header.app .sub {
    color:var(--muted); font-size:10px; letter-spacing:.22em; margin-left:11px; font-weight:600;
    padding:3px 8px; border:1px solid var(--line-strong); border-radius:5px;
  }
  .toolbar { display:flex; gap:9px; align-items:center; }
  /* 検索ボックス */
  .search-box {
    display:flex; align-items:center; gap:6px; flex-shrink:1; min-width:0;
    background:var(--panel-2); border:1px solid var(--line-strong); border-radius:8px;
    padding:0 9px; height:36px; transition:border-color .15s, box-shadow .15s;
  }
  .search-box:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
  .search-box .search-ic { color:var(--muted); flex-shrink:0; }
  .search-box:focus-within .search-ic { color:var(--accent-bright); }
  .search-box input {
    border:none; outline:none; background:transparent; color:var(--ink);
    font-family:inherit; font-size:13px; width:150px; min-width:0; padding:0;
  }
  .search-box input::placeholder { color:var(--muted-2); }
  .search-clear {
    border:none; background:transparent; padding:2px; margin:0; width:20px; height:20px;
    display:inline-flex; align-items:center; justify-content:center; border-radius:5px;
    color:var(--muted); flex-shrink:0;
  }
  .search-clear:hover { background:var(--elevated); color:var(--ink); border:none; }
  .count {
    font-size:12px; color:var(--muted); margin-right:8px; font-variant-numeric:tabular-nums;
    letter-spacing:.04em;
  }
  button {
    font-family:inherit; cursor:pointer; border:1px solid var(--line-strong);
    background:var(--panel-2); color:var(--ink-dim); padding:8px 15px; border-radius:8px;
    font-size:13px; font-weight:500; transition:all .15s ease; letter-spacing:.01em;
  }
  button:hover { border-color:var(--accent); color:var(--accent-bright); background:var(--elevated); }
  button:active { transform:translateY(1px); }
  button.primary {
    background:linear-gradient(180deg, var(--accent-bright), var(--accent));
    color:#fff; border:1px solid transparent; box-shadow:0 2px 10px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,.18);
  }
  button.primary:hover { box-shadow:0 4px 16px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,.22); color:#fff; }
  button.ghost { border-color:transparent; background:transparent; color:var(--muted); }
  button.ghost:hover { color:var(--ink); background:var(--panel-2); }
  .file-input { display:none; }
  .icon-btn {
    width:36px; height:36px; padding:0; display:inline-flex; align-items:center;
    justify-content:center; flex-shrink:0;
  }
  .icon-btn svg { display:block; }

  .main { flex:1; display:flex; overflow:hidden; position:relative; }
  .sheet-wrap {
    flex:1; overflow:auto; padding:0 22px 80px;
    overscroll-behavior:none;   /* 縦横とも余分なバウンス(引っ張り)を止める */
  }
  table { border-collapse:separate; border-spacing:0; width:100%; min-width:580px; }
  thead th {
    position:sticky; top:0; z-index:5;
    background:var(--bg); text-align:left;
    font-size:10px; letter-spacing:.13em; color:var(--muted); text-transform:uppercase;
    font-weight:600; padding:18px 16px 11px; height:auto; border:none;
  }
  /* sticky ヘッダーの上端をページ背景で覆い、スクロール行がパディングの隙間から見えるのを防ぐ */
  thead th::before {
    content:""; position:absolute; left:0; right:0; top:-20px; height:20px;
    background:var(--bg); pointer-events:none;
  }
  th.col-num { width:48px; text-align:center; padding-left:0; padding-right:0; }
  th.col-memo { width:62px; text-align:center; }

  tbody td {
    height:var(--row-h); padding:0; position:relative; vertical-align:middle;
    background:var(--panel); border-top:1px solid var(--line-soft);
    transition:background .12s;
  }
  /* 行の角丸:左端と右端 */
  tbody tr td:first-child { border-left:1px solid var(--line-soft); }
  tbody tr td:last-child { border-right:1px solid var(--line-soft); }
  tbody tr:first-child td { border-top:1px solid var(--line); }
  tbody tr td:first-child { border-top-left-radius:0; }

  td.num {
    width:48px; text-align:center; color:var(--muted-2); font-size:11px; font-weight:600;
    background:var(--bg-2); user-select:none; font-variant-numeric:tabular-nums;
  }
  td.data { cursor:text; }
  td.data .cell {
    padding:0 16px; height:var(--row-h); line-height:var(--row-h);
    white-space:nowrap; overflow:hidden; outline:none; color:var(--ink);
    transition:color .12s;
  }
  td.data .cell:empty::before { content:attr(data-ph); color:var(--muted-2); font-weight:400; }
  /* 人物別グループの追加行:自動付与される人物名の薄字表示(通常プレースホルダより少し人物名らしく) */
  td.data .cell.ghost-name:empty::before { color:var(--muted); font-style:italic; opacity:.7; }
  td.data.focus {
    box-shadow:inset 0 0 0 1.5px var(--accent); background:var(--elevated); z-index:8;
    border-radius:7px;
  }
  td.data.focus .cell { color:#fff; }
  tbody tr:hover td:not(.num) { background:var(--panel-2); }
  tbody tr.selected td { background:var(--sel); }
  tbody tr.selected td:not(.num) { box-shadow:inset 0 0 0 0 transparent; }
  tbody tr.selected td.num { background:#13243d; color:var(--accent-bright); }
  tbody tr.selected td:first-child { box-shadow:inset 2px 0 0 var(--accent); }
  tbody tr.adder td { background:transparent; }
  tbody tr.adder td.num { background:transparent; color:var(--muted-2); }
  tbody tr.adder:hover td:not(.num) { background:var(--panel); }
  tbody tr.adder td .cell:empty::before { color:var(--muted-2); opacity:.6; }

  th.col-date { width:128px; }
  td.date {
    width:128px; padding:0; color:var(--muted); font-size:12px;
    font-variant-numeric:tabular-nums; white-space:nowrap;
    letter-spacing:.02em; position:relative;
  }
  td.date .dcell {
    padding:0 14px; height:var(--row-h); line-height:var(--row-h);
    white-space:nowrap; overflow:hidden;
    outline:none; color:var(--ink-dim); cursor:text;
  }
  td.date.focus { box-shadow:inset 0 0 0 1.5px var(--accent); background:var(--elevated); border-radius:7px; z-index:8; }
  td.date.focus .dcell { color:#fff; }
  tbody tr.done td.date .dcell { color:var(--muted-2); opacity:.6; }

  td.memo-cell { text-align:center; width:62px; padding:0 10px; }
  td.memo-cell > * { vertical-align:middle; }
  /* 冒頭文プレビュー:既定では隠す(狭い画面ではアイコンのみ) */
  .memo-preview {
    display:none; font-size:12px; color:var(--muted); cursor:pointer;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    line-height:var(--row-h); flex:1; min-width:0; text-align:left;
  }
  .memo-preview:hover { color:var(--ink-dim); }
  tbody tr.done .memo-preview { color:var(--muted-2); opacity:.6; }
  .memo-dot {
    display:inline-flex; align-items:center; justify-content:center; width:30px; height:26px;
    border-radius:7px; font-size:12px; cursor:pointer; color:var(--muted);
    border:1px solid transparent; transition:all .14s; flex-shrink:0;
  }
  .memo-dot:hover { background:var(--elevated); border-color:var(--line-strong); color:var(--accent-bright); }
  .memo-dot.has {
    color:var(--accent-bright); background:var(--accent-soft);
    border-color:rgba(76,141,255,.25); font-weight:700;
  }
  .memo-dot .badge { font-size:9px; margin-left:2px; opacity:.85; }

  /* 広い画面ではメモ列を広げ、冒頭文を1行プレビュー表示 */
  @media (min-width:1000px){
    th.col-memo { width:240px; text-align:left; padding-left:16px; }
    td.memo-cell { width:240px; display:flex; align-items:center; gap:8px; padding:0 12px 0 16px; }
    /* メモがある行:プレビューのみ表示し、鉛筆アイコンは隠す */
    td.memo-cell.has-memo .memo-preview { display:block; }
    td.memo-cell.has-memo .memo-dot { display:none; }
    /* メモが空の行:プレビューは出さず、追加用アイコン(+)を表示 */
    td.memo-cell:not(.has-memo) .memo-preview { display:none; }
    td.memo-cell:not(.has-memo) .memo-dot { display:inline-flex; margin-left:auto; }
  }

  /* URL列(Title と 1:1。Memo と同じ作り) */
  th.col-url { width:62px; text-align:center; }
  td.url-cell { text-align:center; width:62px; padding:0 10px; }
  td.url-cell > * { vertical-align:middle; }
  .url-preview {
    display:none; font-size:12px; color:var(--muted); cursor:pointer;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    line-height:var(--row-h); flex:1; min-width:0; text-align:left;
  }
  .url-preview:hover { color:var(--ink-dim); }
  tbody tr.done .url-preview { color:var(--muted-2); opacity:.6; }
  .url-dot {
    display:inline-flex; align-items:center; justify-content:center; width:30px; height:26px;
    border-radius:7px; font-size:13px; cursor:pointer; color:var(--muted);
    border:1px solid transparent; transition:all .14s; flex-shrink:0;
  }
  .url-dot:hover { background:var(--elevated); border-color:var(--line-strong); color:var(--accent-bright); }
  .url-dot.has {
    color:var(--accent-bright); background:var(--accent-soft);
    border-color:rgba(76,141,255,.25);
  }
  @media (min-width:1000px){
    th.col-url { width:200px; text-align:left; padding-left:16px; }
    td.url-cell { width:200px; display:flex; align-items:center; gap:8px; padding:0 12px 0 16px; }
    td.url-cell.has-url .url-preview { display:block; }
    td.url-cell.has-url .url-dot { display:none; }
    td.url-cell:not(.has-url) .url-preview { display:none; }
    td.url-cell:not(.has-url) .url-dot { display:inline-flex; margin-left:auto; }
  }
  tbody tr.done .url-dot { opacity:.4; }

  /* URLパネル本体(memo-panel と同じ枠を使い、入力欄+iframeプレビューを縦に並べる) */
  .url-body { padding:14px 16px; display:flex; flex-direction:column; gap:10px; flex:1; min-height:0; }
  .url-row { display:flex; gap:8px; align-items:stretch; flex-shrink:0; }
  .url-body input[type="url"] {
    flex:1; min-width:0;
    background:var(--panel-2); border:1px solid var(--line-strong); border-radius:8px;
    padding:9px 11px; color:var(--ink); font-family:inherit; font-size:13px; outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  .url-body input[type="url"]::placeholder { color:var(--muted-2); }
  .url-body input[type="url"]:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
  .url-body input[type="url"]:disabled { background:var(--bg); color:var(--muted-2); border-style:dashed; }
  .url-open {
    display:inline-flex; align-items:center; padding:0 12px; font-size:12px;
    color:var(--accent-bright); text-decoration:none; flex-shrink:0;
    border:1px solid var(--line-strong); border-radius:8px;
    background:var(--panel-2); transition:all .14s; white-space:nowrap;
  }
  .url-open:hover { background:var(--elevated); border-color:var(--accent); }
  .url-open[aria-disabled="true"] { color:var(--muted-2); pointer-events:none; opacity:.5; }
  /* iframe プレビュー領域 */
  .url-preview-frame {
    position:relative; flex:1; min-height:0;
    background:var(--bg-2); border:1px solid var(--line); border-radius:8px;
    overflow:hidden; display:flex; flex-direction:column;
  }
  .url-preview-frame iframe {
    flex:1; width:100%; border:0; background:#fff;
    display:none;   /* URL未設定時は非表示 */
  }
  .url-preview-frame.has iframe { display:block; }
  .url-preview-empty {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    padding:20px; text-align:center; color:var(--muted-2); font-size:12px;
  }
  .url-preview-frame.has .url-preview-empty { display:none; }
  .url-preview-hint {
    flex-shrink:0; padding:8px 12px; font-size:11px; color:var(--muted);
    background:var(--bg); border-top:1px solid var(--line); line-height:1.5;
    display:none;
  }
  .url-preview-frame.has .url-preview-hint { display:block; }

  /* 候補 */
  .suggest {
    position:absolute; left:0; top:calc(100% + 2px); z-index:30;
    background:var(--elevated); border:1px solid var(--line-strong); border-radius:9px;
    box-shadow:0 16px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(76,141,255,.08);
    max-height:230px; overflow-y:auto; min-width:100%; width:max-content; max-width:300px;
    padding:5px; overflow:hidden;
  }
  .suggest div {
    padding:8px 12px; font-size:13px; cursor:pointer; border-radius:6px;
    white-space:nowrap; color:var(--ink-dim); transition:all .1s;
  }
  .suggest div:hover, .suggest div.active { background:var(--accent-soft); color:var(--accent-bright); }

  /* メモパネル */
  .memo-panel {
    width:0; flex-shrink:0; background:var(--bg-2);
    border-left:1px solid var(--line); display:flex; flex-direction:column;
    overflow:hidden; transition:width .22s cubic-bezier(.4,0,.2,1);
  }
  .memo-panel.open { width:380px; }
  .memo-panel.url-panel.open { width:480px; }
  @media (max-width:760px){ .memo-panel.open, .memo-panel.url-panel.open { width:100%; position:absolute; right:0; top:0; bottom:0; z-index:50; } }
  /* スマホ:左右パディングを詰めて、横スクロール時の左右の余白ズレ(グラグラ)を抑える */
  @media (max-width:760px){
    .sheet-wrap { padding:0 0 80px; }
    .sheet-wrap > table { margin:0 12px; width:calc(100% - 24px); }
    thead th { padding-top:12px; }
    /* チェックと番号が詰まって見えないよう、間隔と区切りを持たせる */
    th.col-check, td.check { width:40px; }
    th.col-num, td.num { width:44px; }
    td.check + td.num, th.col-check + th.col-num { border-left:1px solid var(--line-soft); }
    /* ヘッダーは2段組み:1段目=見出し+検索、2段目=コントロール群 */
    header.app { padding:10px 12px; gap:8px; flex-direction:column; align-items:stretch; }
    header.app h1 { font-size:15px; }
    .head-main { width:100%; gap:10px; }
    .head-main .search-box { flex:1; min-width:0; }   /* 検索は見出しの右で残り幅いっぱい */
    .head-main .search-box input { flex:1; width:auto; min-width:0; }
    .toolbar { gap:8px; flex-wrap:wrap; justify-content:space-between; min-width:0; width:100%; }
  }
  .memo-head { padding:20px 22px 16px; border-bottom:1px solid var(--line); position:relative; }
  .memo-head .lbl { font-size:10px; letter-spacing:.18em; color:var(--muted); text-transform:uppercase; font-weight:600; }
  .memo-head .ttl { font-size:18px; font-weight:600; margin-top:6px; word-break:break-all; color:var(--ink); padding-right:30px; }
  .memo-head .ttl.none { color:var(--muted-2); font-weight:400; }
  .memo-close-x {
    position:absolute; top:14px; right:14px; width:30px; height:30px; padding:0;
    display:inline-flex; align-items:center; justify-content:center;
    border:1px solid transparent; background:transparent; color:var(--muted); border-radius:7px;
  }
  .memo-close-x:hover { background:var(--panel-2); color:var(--ink); border-color:var(--line-strong); }
  .memo-link-note {
    font-size:11px; color:var(--ok); margin-top:8px; min-height:15px;
    display:flex; align-items:center; gap:5px;
  }
  .memo-body { flex:1; padding:16px 22px; }
  .memo-body textarea {
    width:100%; height:100%; resize:none; border:1px solid var(--line-strong);
    border-radius:10px; padding:14px; font-family:inherit; font-size:14px; line-height:1.75;
    background:var(--panel); color:var(--ink); transition:border-color .15s, box-shadow .15s;
  }
  .memo-body textarea::placeholder { color:var(--muted-2); }
  .memo-body textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
  .memo-body textarea:disabled { background:var(--bg); color:var(--muted-2); border-style:dashed; }
  .memo-foot { padding:12px 22px 18px; display:flex; justify-content:space-between; align-items:center; }
  .memo-foot .saved { font-size:11px; color:var(--ok); display:flex; align-items:center; gap:5px; }

  /* データ取得中ローディング / エラー表示 */
  .status-overlay {
    position:absolute; inset:0; z-index:60; display:none;
    align-items:center; justify-content:center;
    background:rgba(15,17,21,.78); backdrop-filter:blur(3px);
  }
  .status-overlay.show { display:flex; }
  .status-box {
    display:flex; flex-direction:column; align-items:center; gap:16px;
    padding:30px 38px; text-align:center; max-width:340px;
  }
  .status-spinner {
    width:34px; height:34px; border-radius:50%;
    border:3px solid var(--line-strong); border-top-color:var(--accent);
    animation:status-spin .8s linear infinite;
  }
  @keyframes status-spin { to { transform:rotate(360deg); } }
  .status-msg { font-size:14px; color:var(--ink-dim); line-height:1.6; }
  .status-overlay.error .status-msg { color:var(--ink); }
  .status-overlay.error .status-spinner { display:none; }
  .status-overlay.error .status-box::before {
    content:"!"; display:flex; align-items:center; justify-content:center;
    width:38px; height:38px; border-radius:50%; font-size:20px; font-weight:700;
    color:var(--warn); border:2px solid var(--warn); margin-bottom:2px;
  }
  .status-retry { margin-top:4px; }

  /* グループ化トグルスイッチ */
  .switch {
    display:inline-flex; align-items:center; gap:8px; cursor:pointer; user-select:none;
    white-space:nowrap; padding:0 2px;
  }
  .switch input { position:absolute; opacity:0; width:0; height:0; }
  .switch .track {
    position:relative; width:38px; height:22px; border-radius:11px;
    background:var(--panel-2); border:1px solid var(--line-strong);
    transition:background .18s, border-color .18s; flex-shrink:0;
  }
  .switch .thumb {
    position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%;

<script type="module">
  // Firebase 初期化(Firestore でデータをクラウド保存・複数端末で自動同期)
  // ※ ?demo モードでは Firebase を一切読み込まない(オフライン/プレビュー用)

  /* =========================================================
     仮機能:?demo クエリ付きでアクセスするとサンプルデータを表示する
     (Firebase に繋がない・保存もしない。確認用。不要になったらこのブロックごと削除)
     ========================================================= */
  const isDemo = new URLSearchParams(location.search).has("demo");
  if(isDemo){
    const DEMO_DATA = {
      persons:{ p1:"みん", p2:"ささん", p3:"ぬい", p4:"かろ" },
      items:{
        i1:"青薔薇", i2:"たこやき", i3:"手紙",

      },
      urls:{
        t1:"https://example.com/",
        t4:"https://example.org/"
      },
      records:[
        {id:"r1", personId:"p1", itemId:"i1", titleId:"t1", done:true,  created:1700000000000},
        {id:"r2", personId:"p2", itemId:"i1", titleId:"t1", done:false, created:1700000001000},
        {id:"r3", personId:"p1", itemId:"i2", titleId:"t2", done:true,  created:1700000002000},
        {id:"r4", personId:"p1", itemId:"i3", titleId:"t3", done:false, created:1700000003000},
        {id:"r5", personId:"p3", itemId:"i4", titleId:"t4", done:true,  created:1700000004000},
        {id:"r6", personId:"p4", itemId:"i5", titleId:"t5", done:false, created:1700000005000},
        {id:"r7", personId:"p3", itemId:"i6", titleId:"t6", done:true,  created:1700000006000},
        {id:"r8", personId:"p2", itemId:"i6", titleId:"t6", done:false, created:1700000007000}
      ]
    };
    let demoDb = JSON.parse(JSON.stringify(DEMO_DATA));
    let demoListener = null;
    window.__cloud = {
      ready:true, uid:"demo-user",
      save(data){ demoDb = JSON.parse(JSON.stringify(data)); if(demoListener) demoListener(demoDb); return Promise.resolve(); },
      subscribe(cb){
        demoListener = cb;
        setTimeout(()=>cb(JSON.parse(JSON.stringify(demoDb))), 50);
        return ()=>{ demoListener=null; };
      }
    };
    window.dispatchEvent(new Event("cloud-ready"));
    console.log("Running in DEMO mode (no Firebase). Remove ?demo to use real data.");
  } else {
    // 通常モード:Firebase を動的にロードしてから初期化
    const [{ initializeApp }, { getFirestore, doc, setDoc, onSnapshot }, { getAuth, signInAnonymously, onAuthStateChanged }] = await Promise.all([
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"),
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js")
    ]);

    const firebaseConfig = {
    apiKey: "AIzaSyBqVZkrGtOvvZ2edAHv15mGQT4UoX6QD1o",
    authDomain: "comment-manager-ec9d0.firebaseapp.com",
    projectId: "comment-manager-ec9d0",
    storageBucket: "comment-manager-ec9d0.firebasestorage.app",
    messagingSenderId: "93426323467",
    appId: "1:93426323467:web:84ba6b668ae32b4969b70e"
  };

  const app = initializeApp(firebaseConfig);
  const fdb = getFirestore(app);
  const auth = getAuth(app);
  const DOC = doc(fdb, "app", "main");   // データは app/main の1ドキュメントに丸ごと保存

  // メインスクリプトから使えるよう、最小限のAPIをグローバルに公開
  // ready は匿名サインイン完了後に true になる(それまで Firestore アクセスはルールに弾かれるため)
  window.__cloud = {
    ready: false,
    uid: null,
    // 保存:db全体を1ドキュメントに書き込む
    save(data){ return setDoc(DOC, { db: data, updatedAt: Date.now() }); },
    // 購読:クラウド側が変わるたび cb(data) が呼ばれる。エラー時は errCb(err)
    subscribe(cb, errCb){
      return onSnapshot(DOC, (snap)=>{
        if(snap.exists()){ const v=snap.data(); cb(v && v.db ? v.db : {}); }
        else { cb({}); }   // ドキュメント未作成(初回・空)も「取得成功・データ無し」として扱う
      }, (err)=>{
        console.error("Firestore subscribe error:", err);
        if(typeof errCb==="function") errCb(err);
      });
    }
  };

  // 匿名サインイン。完了(uid 取得)を待ってから ready を立て、cloud-ready を通知する
  onAuthStateChanged(auth, (user)=>{
    if(user && !window.__cloud.ready){
      window.__cloud.ready = true;
      window.__cloud.uid = user.uid;
      console.log("Signed in anonymously. uid =", user.uid);  // ← この uid を控える(ルール直書き用)
      window.dispatchEvent(new Event("cloud-ready"));
    }
  });
  signInAnonymously(auth).catch(err=>{
    console.error("Anonymous sign-in failed:", err);
    window.dispatchEvent(new CustomEvent("cloud-error", { detail:{ phase:"auth", error:err } }));
  });
  }   // end of: if(isDemo) ... else { ... }

<script>
"use strict";
/* =========================================================
   モデル
   ========================================================= */
let db={ persons:{}, items:{}, titles:{}, notes:{}, urls:{}, records:[] };
let selectedRowId=null;
let viewMode="flat";   // "flat" | "byPerson"
let hideDone=false;
let searchQuery="";   // 検索文字列(Name/Item/Title を対象に絞り込み)
const expandedGroups=new Set();   // 展開中の人物ID(グループ表示の開閉状態。既定は空=すべて閉じる。表示設定なので保存しない)

/* =========================================================
   ステータス表示(取得中ローディング / エラー)
   ========================================================= */
const statusOverlay=document.getElementById("statusOverlay");
const statusMsg=document.getElementById("statusMsg");
const statusRetry=document.getElementById("statusRetry");
function showLoading(msg){
  statusOverlay.classList.remove("error");
  statusRetry.style.display="none";
  statusMsg.textContent=msg||"Loading…";
  statusOverlay.classList.add("show");
}
function showError(msg){
  statusOverlay.classList.add("error","show");
  statusMsg.textContent=msg;
  statusRetry.style.display="";
}
function hideStatus(){ statusOverlay.classList.remove("show","error"); }
statusRetry.addEventListener("click",()=>{ location.reload(); });

/* クラウド同期の状態管理 */
let cloudSaveTimer=null;     // 連続保存をまとめる
let applyingRemote=false;    // クラウドからの反映中フラグ(自分の保存ループを防ぐ)

function persist(){
  // Firestore へ保存(連続入力をまとめて、少し待ってから送る)
  if(applyingRemote) return;           // クラウド反映中の保存はスキップ(ループ防止)
  if(!(window.__cloud && window.__cloud.ready)) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer=setTimeout(()=>{
    window.__cloud.save(db).catch(err=>console.error("Cloud save failed:", err));
  }, 400);
}

/* レコードの整合補完(done/created)。クラウド受信データに使う */
function normalizeRecords(){
  db.records.forEach((r,i)=>{
    if(typeof r.done!=="boolean") r.done=false;
    if(typeof r.created!=="number") r.created = Date.now() - (db.records.length-i)*1000;
  });
}

/* クラウドの最新データを受け取って画面に反映 */
function applyCloudData(data){
  applyingRemote=true;
  try{
    db=Object.assign({persons:{},items:{},titles:{},notes:{},urls:{},records:[]}, data);
    normalizeRecords();
    pruneEmptyRows();   // 受信データ内の空行(人物・アイテム・タイトルが全て空)を掃除
    // 選択中の行がクラウド更新で消えていたらパネルを閉じる
    if(selectedRowId && !db.records.some(r=>r.id===selectedRowId)){
      selectedRowId=null;
      if(typeof memoPanel!=="undefined" && memoPanel) memoPanel.classList.remove("open");
      if(typeof urlPanel!=="undefined" && urlPanel) urlPanel.classList.remove("open");
    } else if(selectedRowId){
      if(typeof refreshMemoPanel==="function" && memoPanel && memoPanel.classList.contains("open")) refreshMemoPanel();
      if(typeof refreshUrlPanel==="function" && urlPanel && urlPanel.classList.contains("open")) refreshUrlPanel();
    }
    render();
  } finally {
    applyingRemote=false;
  }
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function resolveMaster(map,text){ if(text==="") return ""; for(const id in map){ if(map[id]===text) return id; } const id=uid(); map[id]=text; return id; }
function masterText(map,id){ return id===""?"":(map[id]||""); }
function gcMasters(){
  const uP=new Set(),uI=new Set(),uT=new Set();
  db.records.forEach(r=>{ uP.add(r.personId); uI.add(r.itemId); uT.add(r.titleId); });
  for(const id in db.persons) if(!uP.has(id)) delete db.persons[id];
  for(const id in db.items)   if(!uI.has(id)) delete db.items[id];
  for(const id in db.titles)  if(!uT.has(id)){ delete db.titles[id]; delete db.notes[id]; delete db.urls[id]; }
}
const COLS=[
  { key:"personId", map:()=>db.persons, ph:"Name" },
  { key:"itemId",   map:()=>db.items,   ph:"Item" },
  { key:"titleId",  map:()=>db.titles,  ph:"Title" },
];
function titleUseCount(tid){ if(tid==="") return 0; let c=0; db.records.forEach(r=>{ if(r.titleId===tid) c++; }); return c; }

/* =========================================================
   セル値の確定書き込み
   ========================================================= */
function commitCell(rec, colKey, text, isAdderRec){
  // 追加行から新規レコードを作るケース
  if(isAdderRec){
    if(text==="") return null;
    const nr={ id:uid(), personId:"", itemId:"", titleId:"", done:false, created:Date.now() };
    if(colKey==="personId") nr.personId=resolveMaster(db.persons,text);
    if(colKey==="itemId")   nr.itemId  =resolveMaster(db.items,text);
    if(colKey==="titleId")  nr.titleId =resolveMaster(db.titles,text);
    db.records.push(nr); gcMasters(); persist();
    return nr;
  }
  if(colKey==="personId") rec.personId=resolveMaster(db.persons,text);
  if(colKey==="itemId")   rec.itemId  =resolveMaster(db.items,text);
  if(colKey==="titleId")  rec.titleId =resolveMaster(db.titles,text);
  gcMasters(); persist();
  return rec;
}

/* =========================================================
   描画(行は通常レコード + 末尾に1つの追加行)
   重要:DOMは毎回作り直すが、編集はDOM差し替えに依存せず
   contenteditable をそのまま使うので、クリックは常に有効。
   ========================================================= */
const tbody=document.getElementById("tbody");

/* 日付整形 */
function fmtDate(ts){
  if(!ts) return null;
  const d=new Date(ts);
  const z=n=>("0"+n).slice(-2);
  return {
    date: d.getFullYear()+"/"+z(d.getMonth()+1)+"/"+z(d.getDate()),
    time: z(d.getHours())+":"+z(d.getMinutes())
  };
}

/* レコードが完全に空か(人物・アイテム・タイトルすべて空) */
function isEmptyRecord(r){
  return r.personId==="" && r.itemId==="" && r.titleId==="";
}
/* 空行を削除(メモだけ残っていてもタイトルが空なら紐づけ先がないので対象) */
function pruneEmptyRows(){
  const before=db.records.length;
  db.records = db.records.filter(r=> !isEmptyRecord(r));
  if(db.records.length!==before){ gcMasters(); persist(); }
}

/* 検索ヒット判定:Name / Item / Title のいずれかに一致(大小無視) */
function matchesSearch(rec){
  if(searchQuery==="") return true;
  const q=searchQuery.toLowerCase();
  const n=masterText(db.persons, rec.personId).toLowerCase();
  const i=masterText(db.items, rec.itemId).toLowerCase();
  const t=masterText(db.titles, rec.titleId).toLowerCase();
  return n.includes(q) || i.includes(q) || t.includes(q);
}

function visibleRecords(){
  let rows = db.records.slice();
  if(hideDone) rows = rows.filter(r=>!r.done);
  if(searchQuery!=="") rows = rows.filter(matchesSearch);
  // 古い順(created 昇順)。created 同値は配列順を保持
  rows.sort((a,b)=> (a.created||0)-(b.created||0));
  return rows;
}

function render(){
  const focusInfo = captureFocus();
  tbody.innerHTML="";

  if(viewMode==="byPerson"){
    renderByPerson();
  } else {
    let n=0;
    visibleRecords().forEach(rec=>{ n++; tbody.appendChild(buildRow(rec, n, false)); });
    if(searchQuery==="") tbody.appendChild(buildRow(null, n+1, true, ""));  // 末尾の追加行(検索中は出さない)
  }

  if(searchQuery!==""){
    // 検索中は「ヒット件数 / 全件」を表示
    const hits=db.records.filter(matchesSearch).length;
    document.getElementById("count").textContent = hits+" hits";
  } else {
    const total=db.records.length, done=db.records.filter(r=>r.done).length;
    document.getElementById("count").textContent = done+" / "+total;
  }
  restoreFocus(focusInfo);
}

/* 人物別グループ表示 */
function renderByPerson(){
  const rows = visibleRecords();
  // 人物ID -> レコード配列。空人物は最後に「未割り当て」として。
  const groups = new Map();   // personId => [records]
  const order = [];           // 人物IDの登場順
  rows.forEach(r=>{
    const key=r.personId;
    if(!groups.has(key)){ groups.set(key, []); order.push(key); }
    groups.get(key).push(r);
  });
  // 空人物("")を末尾へ
  order.sort((a,b)=> (a===""?1:0)-(b===""?1:0));

  const searching = searchQuery!=="";
  order.forEach(pid=>{
    const recs=groups.get(pid);
    const name = pid==="" ? "Unassigned" : masterText(db.persons, pid);
    // 検索中は一致グループを自動展開。通常時は開閉状態に従う。
    const collapsed = searching ? false : !expandedGroups.has(pid);
    // 件数:通常は db.records 全体から、検索中は一致件数で集計
    let total, done;
    if(searching){
      total = recs.length;
      done = recs.filter(r=> r.done).length;
    } else {
      const all = db.records.filter(r=> r.personId===pid);
      total = all.length;
      done = all.filter(r=> r.done).length;
    }
    tbody.appendChild(buildGroupHead(name, done, total, pid==="", pid, collapsed));
    if(collapsed) return;   // 折りたたみ中は行を出さない
    // 連番は人物ごとに 1 から振り直す
    let n=0;
    recs.forEach(rec=>{ n++; tbody.appendChild(buildRow(rec, n, false)); });
    // その人物の追加行(検索中は出さない)
    if(pid!=="" && !searching) tbody.appendChild(buildRow(null, n+1, true, pid));
  });
  // 新規追加用(検索中は出さない)
  if(!searching){
    tbody.appendChild(buildGroupHead("+ New person", null, null, true, null, false));
    tbody.appendChild(buildRow(null, 1, true, ""));
  }
}

function buildGroupHead(name, done, total, isUnassigned, pid, collapsed){
  const tr=document.createElement("tr");
  tr.className="group-head"+(isUnassigned?" unassigned":"");
  // pid が文字列(空文字含む)なら開閉対象。null("+ New person")は開閉なし。
  const toggleable = (typeof pid === "string");
  if(toggleable){
    tr.classList.add("toggleable");
    if(collapsed) tr.classList.add("collapsed");
  }
  const td=document.createElement("td");
  td.colSpan=8;
  const wrap=document.createElement("div"); wrap.className="gh";
  let inner="";
  if(toggleable){
    inner+='<span class="gchev" aria-hidden="true">'
      +'<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>'
      +'</span>';
  }
  inner+='<span class="nm">'+escapeHtml(name)+'</span>';
  if(total!==null){
    // チェック済み / 全件。未完了が残っている(未達)なら黄色く強調。
    const hot = done<total ? " hot" : "";
    inner+='<span class="gcount'+hot+'"><b>'+done+'</b> / '+total+'</span>';
  }
  inner+='<span class="gline"></span>';
  wrap.innerHTML=inner;
  td.appendChild(wrap); tr.appendChild(td);
  if(toggleable){
    wrap.addEventListener("click",()=>{
      if(expandedGroups.has(pid)) expandedGroups.delete(pid);
      else expandedGroups.add(pid);
      render();
    });
  }
  return tr;
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* レンダー前後でフォーカス位置を保つ(入力が途切れない) */
function captureFocus(){
  const el=document.activeElement;
  if(el && el.classList && el.classList.contains("cell")){
    return { rowId:el.dataset.rowId, col:el.dataset.col, adder:el.dataset.adder==="1" };
  }
  return null;
}
function restoreFocus(info){
  if(!info) return;
  let sel;
  if(info.adder) sel='td.data .cell[data-adder="1"][data-col="'+info.col+'"]';
  else sel='td.data .cell[data-row-id="'+info.rowId+'"][data-col="'+info.col+'"]';
  const el=tbody.querySelector(sel);
  if(el){ placeCaretEnd(el); el.parentElement.classList.add("focus"); }
}
function placeCaretEnd(el){
  el.focus();
  const r=document.createRange(); r.selectNodeContents(el); r.collapse(false);
  const s=window.getSelection(); s.removeAllRanges(); s.addRange(r);
}

function buildRow(rec, num, isAdder, adderPerson){
  const tr=document.createElement("tr");
  if(isAdder) tr.classList.add("adder");
  if(rec && rec.id===selectedRowId) tr.classList.add("selected");
  if(rec && rec.done) tr.classList.add("done");

  // チェック列
  const tdCheck=document.createElement("td"); tdCheck.className="check";
  const chk=document.createElement("input"); chk.type="checkbox";
  if(rec){
    chk.checked=!!rec.done;
    chk.title = rec.done ? "Mark as not done" : "Mark as done";
    chk.addEventListener("change",()=> toggleDone(rec.id, chk.checked));
  }
  tdCheck.appendChild(chk);
  tr.appendChild(tdCheck);

  const tdNum=document.createElement("td");
  tdNum.className="num"; tdNum.textContent=isAdder?"+":num;
  tr.appendChild(tdNum);

  // 日付セル(自動記録・クリックで手動編集可) — 番号の右に配置
  const tdDate=document.createElement("td"); tdDate.className="date";
  if(!isAdder){
    const dcell=document.createElement("div");
    dcell.className="dcell";
    dcell.contentEditable = "true";
    dcell.spellcheck=false;
    dcell.dataset.dateRow=rec.id;
    const f=fmtDate(rec.created);
    dcell.textContent = f ? f.date : "";
    attachDateEvents(dcell, tdDate, rec);
    tdDate.appendChild(dcell);
  }
  tr.appendChild(tdDate);

  COLS.forEach(col=>{
    const td=document.createElement("td"); td.className="data";
    const cell=document.createElement("div");
    cell.className="cell";
    cell.contentEditable = "true";
    cell.spellcheck=false;
    cell.dataset.col=col.key;
    cell.dataset.ph=col.ph;
    if(isAdder){
      cell.dataset.adder="1";
      // 人物別グループの追加行:人物セルは「実テキスト」ではなく薄いプレースホルダ風に表示。
      // 他カラムに入力されると solid 表示へ切り替える(自動入力されたように見せる)。
      if(col.key==="personId" && adderPerson){
        cell.textContent="";
        cell.dataset.ph = masterText(db.persons, adderPerson);   // 薄字で人物名を表示
        cell.classList.add("ghost-name");
      } else {
        cell.textContent="";
      }
      cell.dataset.adderPerson = adderPerson || "";
    } else {
      cell.dataset.rowId=rec.id;
      cell.textContent = masterText(col.map(), rec[col.key]);
    }
    attachCellEvents(cell, td, rec, col, isAdder);
    td.appendChild(cell);
    tr.appendChild(td);
  });

  // URLセル(Titleと1:1。クリックでURLパネルを開く)
  const tdUrl=document.createElement("td"); tdUrl.className="url-cell";
  if(!isAdder){
    const url=(db.urls[rec.titleId]||"").trim();
    if(url) tdUrl.classList.add("has-url");

    const preview=document.createElement("span");
    preview.className="url-preview";
    preview.textContent = url ? prettyUrl(url) : "";

    const dot=document.createElement("div"); dot.className="url-dot";
    if(url){ dot.classList.add("has"); dot.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l3.54-3.54a5 5 0 0 0-7.07-7.07l-1.41 1.41"/><path d="M14 11a5 5 0 0 0-7.07 0l-3.54 3.54a5 5 0 0 0 7.07 7.07l1.41-1.41"/></svg>'; }
    else dot.textContent="+";
    dot.title = rec.titleId==="" ? "Enter a title first" : "Open URL";

    const open=()=>{ selectRowUrl(rec.id); };
    dot.addEventListener("click", open);
    preview.addEventListener("click", open);

    tdUrl.appendChild(preview);
    tdUrl.appendChild(dot);
  }
  tr.appendChild(tdUrl);

  const tdMemo=document.createElement("td"); tdMemo.className="memo-cell";
  if(!isAdder){
    const memo=(db.notes[rec.titleId]||"").trim();
    const cnt=titleUseCount(rec.titleId);
    if(memo) tdMemo.classList.add("has-memo");   // メモ有無で表示を出し分け

    // 冒頭文プレビュー(広い画面でのみ表示。1行・はみ出しは…で省略)
    const preview=document.createElement("span");
    preview.className="memo-preview";
    // 改行は空白に置換して1行に
    preview.textContent = memo ? memo.replace(/\s+/g," ") : "";

    const dot=document.createElement("div"); dot.className="memo-dot";
    if(memo){ dot.classList.add("has"); dot.innerHTML="&#9998;"+(cnt>1?'<span class="badge">'+cnt+'</span>':''); }
    else dot.textContent="+";
    dot.title = rec.titleId==="" ? "Enter a title first" : "Open memo";

    // プレビューもクリックでメモを開けるように
    const open=()=>{ selectRow(rec.id); };
    dot.addEventListener("click", open);
    preview.addEventListener("click", open);

    tdMemo.appendChild(preview);
    tdMemo.appendChild(dot);
  }
  tr.appendChild(tdMemo);
  return tr;
}

function toggleDone(id, val){
  const rec=db.records.find(r=>r.id===id);
  if(!rec) return;
  rec.done=val;
  // 完了にした行が選択中ならメモパネルを閉じる
  if(val && selectedRowId===id){ selectedRowId=null; closeAllPanels(); }
  persist(); render();
}

/* 日付の手動編集。YYYY/MM/DD(区切りは / - . 空白いずれも可)を受け付ける */
function parseDateInput(str){
  const s=str.trim();
  if(!s) return null;
  const m=s.match(/^(\d{4})\s*[\/\-\.年]\s*(\d{1,2})\s*[\/\-\.月]\s*(\d{1,2})\s*日?$/);
  if(!m) return null;
  const y=+m[1], mo=+m[2], d=+m[3];
  if(mo<1||mo>12||d<1||d>31) return null;
  const dt=new Date(y, mo-1, d, 12, 0, 0); // 正午で固定(タイムゾーンずれ回避)
  // 実在日チェック(2月30日などを弾く)
  if(dt.getFullYear()!==y || dt.getMonth()!==mo-1 || dt.getDate()!==d) return null;
  return dt.getTime();
}
function attachDateEvents(dcell, td, rec){
  dcell.addEventListener("focus", ()=> td.classList.add("focus"));
  let composing=false;
  dcell.addEventListener("compositionstart",()=>composing=true);
  dcell.addEventListener("compositionend",()=>composing=false);
  dcell.addEventListener("keydown",(e)=>{
    if(e.isComposing||e.keyCode===229) return;
    if(e.key==="Enter"){ e.preventDefault(); dcell.blur(); }
    else if(e.key==="Escape"){ const f=fmtDate(rec.created); dcell.textContent=f?f.date:""; dcell.blur(); }
  });
  dcell.addEventListener("blur", ()=>{
    td.classList.remove("focus");
    const f=fmtDate(rec.created);
    const cur=f?f.date:"";
    const txt=dcell.textContent.trim();
    if(txt===cur) return;            // 変更なし

    // 日付を空にした場合
    if(txt===""){
      // 人物・アイテム・タイトルがすべて空なら、この行ごと削除
      if(rec.personId==="" && rec.itemId==="" && rec.titleId===""){
        db.records = db.records.filter(r=>r.id!==rec.id);
        if(selectedRowId===rec.id){ selectedRowId=null; closeAllPanels(); }
        gcMasters(); persist(); render();
        return;
      }
      // 内容が残っているなら日付は必須 → 元に戻す
      dcell.textContent=cur;
      return;
    }

    const ts=parseDateInput(txt);
    if(ts===null){
      // パース不可 → 元に戻す
      dcell.textContent=cur;
      return;
    }
    rec.created=ts;
    persist();
    render();                        // 並び順(古い順)に反映
  });
}

/* =========================================================
   セルのイベント:contenteditable + 候補
   ========================================================= */
function closeSuggest(){ const b=document.querySelector(".suggest"); if(b) b.remove(); }

function attachCellEvents(cell, td, rec, col, isAdder){
  const map=col.map();
  let activeIdx=-1, sItems=[];

  cell.addEventListener("focus", ()=>{ td.classList.add("focus"); });

  let composing=false;
  cell.addEventListener("compositionstart", ()=>{ composing=true; });
  cell.addEventListener("compositionend", ()=>{ composing=false; openSuggest(); });

  cell.addEventListener("input", ()=>{
    // 人物別グループの追加行:他カラムに入力されたら、人物セルの薄字を solid 表示へ
    // 切り替えて「自動入力された」見た目にする。空にしたら薄字へ戻す。
    if(isAdder && cell.dataset.adderPerson && col.key!=="personId"){
      const tr=cell.closest("tr");
      const nameCell=tr && tr.querySelector('.cell[data-col="personId"]');
      if(nameCell){
        const name=masterText(db.persons, cell.dataset.adderPerson);
        if(cell.textContent!==""){
          if(nameCell.textContent!==name){ nameCell.textContent=name; }
          nameCell.classList.remove("ghost-name");
        } else {
          nameCell.textContent="";
          nameCell.classList.add("ghost-name");
        }
      }
    }
    if(composing) return;   // 変換中は候補を出さない(ちらつき防止)
    openSuggest();
  });

  function openSuggest(){
    closeSuggest(); activeIdx=-1; sItems=[];
    const v=cell.textContent;
    if(!v) return;
    const seen=new Set(), matches=[];
    for(const id in map){ const t=map[id]; if(t==="" || seen.has(t)) continue; seen.add(t); if(t.includes(v) && t!==v) matches.push(t); }
    if(!matches.length) return;
    const box=document.createElement("div"); box.className="suggest";
    matches.slice(0,30).forEach(t=>{
      const d=document.createElement("div"); d.textContent=t;
      d.addEventListener("mousedown",(e)=>{ e.preventDefault(); cell.textContent=t; closeSuggest(); commit(); });
      box.appendChild(d);
    });
    sItems=Array.from(box.children);
    td.appendChild(box);
  }
  function highlight(){ sItems.forEach((el,i)=>el.classList.toggle("active",i===activeIdx)); }

  cell.addEventListener("keydown",(e)=>{
    // IME変換確定のEnterはセル確定として扱わない
    if(e.isComposing || e.keyCode===229) return;
    const box=document.querySelector(".suggest");
    if(e.key==="ArrowDown" && box){ e.preventDefault(); activeIdx=Math.min(activeIdx+1,sItems.length-1); highlight(); }
    else if(e.key==="ArrowUp" && box){ e.preventDefault(); activeIdx=Math.max(activeIdx-1,0); highlight(); }
    else if(e.key==="Enter"){
      e.preventDefault();
      if(box&&activeIdx>=0) cell.textContent=sItems[activeIdx].textContent;
      closeSuggest();
      cell.blur();   // blur 側で commit を一括処理(二重防止)
    }
    else if(e.key==="Escape"){ closeSuggest(); cell.blur(); }
  });

  cell.addEventListener("blur", ()=>{
    td.classList.remove("focus");
    setTimeout(closeSuggest, 100);
    commit();
  });

  function commit(){
    const text = cell.textContent;
    if(isAdder){
      const adderPerson = cell.dataset.adderPerson || "";
      // 人物セルは空(薄字プレースホルダ)で始まる。空のまま離れたら新規作成しない。
      if(text!==""){
        const nr=commitCell(null, col.key, text, true);
        // 人物別グループの追加行で、人物以外の列に入力した場合は所属人物も付与
        if(nr && adderPerson && col.key!=="personId" && nr.personId===""){
          nr.personId = adderPerson;
          persist();
        }
        render();   // 追加行が本物の行になったので再描画
        if(nr){
          const el=tbody.querySelector('td.data .cell[data-row-id="'+nr.id+'"][data-col="'+col.key+'"]');
          if(el) placeCaretEnd(el);
        }
      }
      // 空のまま離れた場合は何もしない(再描画もしない=チラつき防止)
    } else {
      const before = masterText(map, rec[col.key]);
      if(text!==before){
        commitCell(rec, col.key, text, false);
        // 3列すべて空になったらこの行を削除
        if(isEmptyRecord(rec)){
          db.records = db.records.filter(r=>r.id!==rec.id);
          if(selectedRowId===rec.id){ selectedRowId=null; closeAllPanels(); }
          gcMasters(); persist(); render();
          return;
        }
        if(col.key==="titleId" && selectedRowId===rec.id){
          refreshMemoPanel();
          if(typeof refreshUrlPanel==="function") refreshUrlPanel();
        }
        render();   // メモバッジ・件数の更新のため
      }
      // 値が変わっていなければ再描画しない(無駄なチラつきを防ぐ)
    }
  }
}

const memoPanel=document.getElementById("memoPanel");
const memoText=document.getElementById("memoText");
const memoTitle=document.getElementById("memoTitle");
const memoLinkNote=document.getElementById("memoLinkNote");

function selectRow(id){

}
function refreshMemoPanel(){
  const rec=db.records.find(r=>r.id===selectedRowId);

  } else {

    if(document.activeElement!==memoText){ memoText.value=db.notes[rec.titleId]||""; }
    const cnt=titleUseCount(rec.titleId);
    memoLinkNote.textContent = cnt>1 ? ("Shared across "+cnt+" rows") : "";
  }
  memoSaved.textContent="";
}
let saveTimer=null;
memoText.addEventListener("input",()=>{
  const rec=db.records.find(r=>r.id===selectedRowId);

/* パネルの外側をクリックしたら閉じる(パネル内・メモアイコン・プレビューは除く) */

/* =========================================================
   URLパネル(Memo と同じ作り。Title と 1:1)
   ========================================================= */
const urlPanel=document.getElementById("urlPanel");
const urlText=document.getElementById("urlText");
const urlTitleEl=document.getElementById("urlTitle");
const urlLinkNote=document.getElementById("urlLinkNote");
const urlSaved=document.getElementById("urlSaved");
const urlOpenLink=document.getElementById("urlOpen");
const urlIframe=document.getElementById("urlIframe");
const urlPreviewFrame=document.getElementById("urlPreviewFrame");

function isValidHttpUrl(s){
  s=String(s||"").trim();
  return /^https?:\/\/\S+/i.test(s);
}

function selectRowUrl(id){
  // URLパネルを開く時はメモパネルを閉じる(同時に2つ開かない)
  if(memoPanel.classList.contains("open")){ memoPanel.classList.remove("open"); }
  selectedRowId=id; urlPanel.classList.add("open"); refreshUrlPanel(); loadIframeFromInput(); render();
}
function refreshUrlPanel(){
  const rec=db.records.find(r=>r.id===selectedRowId);
  if(!rec){ urlPanel.classList.remove("open"); return; }
  const tText=masterText(db.titles, rec.titleId);
  if(rec.titleId===""){
    urlTitleEl.textContent="No title"; urlTitleEl.classList.add("none");
    urlText.value=""; urlText.disabled=true; urlLinkNote.textContent="Enter a title to add a URL";
  } else {
    urlTitleEl.textContent=tText; urlTitleEl.classList.remove("none");
    urlText.disabled=false;
    if(document.activeElement!==urlText){ urlText.value=db.urls[rec.titleId]||""; }
    const cnt=titleUseCount(rec.titleId);
    urlLinkNote.textContent = cnt>1 ? ("Shared across "+cnt+" rows") : "";
  }
  refreshUrlOpenLink();
  urlSaved.textContent="";
}
function refreshUrlOpenLink(){
  const v=(urlText.value||"").trim();
  if(isValidHttpUrl(v)){
    urlOpenLink.href=v; urlOpenLink.setAttribute("aria-disabled","false");
  } else {
    urlOpenLink.removeAttribute("href"); urlOpenLink.setAttribute("aria-disabled","true");
  }
}
/* iframe にURLを反映。連続入力での重い読み込みを避け、blur や Enter のときに呼ぶ。
   現在の iframe src と同じなら再読み込みしない(チラつき防止)。 */
function loadIframeFromInput(){
  const v=(urlText.value||"").trim();
  if(isValidHttpUrl(v)){
    if(urlIframe.src !== v){ urlIframe.src = v; }
    urlPreviewFrame.classList.add("has");
  } else {
    if(urlIframe.src){ urlIframe.removeAttribute("src"); }
    urlPreviewFrame.classList.remove("has");
  }
}
let urlSaveTimer=null;
urlText.addEventListener("input",()=>{
  const rec=db.records.find(r=>r.id===selectedRowId);
  if(!rec || rec.titleId==="") return;
  db.urls[rec.titleId]=urlText.value; persist();
  urlSaved.textContent="Saved";
  clearTimeout(urlSaveTimer); urlSaveTimer=setTimeout(()=>urlSaved.textContent="",1500);
  refreshUrlOpenLink();
  render();   // 一覧のプレビューを即時更新(iframe はここでは更新しない)
});
// 入力確定:blur または Enter で iframe を読み込み
urlText.addEventListener("blur", loadIframeFromInput);
urlText.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){ e.preventDefault(); urlText.blur(); loadIframeFromInput(); }
});
function closeUrl(){
  if(!urlPanel.classList.contains("open")) return;
  urlPanel.classList.remove("open");
  // iframe を停止(裏でリソース消費しないよう src を外す)
  if(urlIframe.src){ urlIframe.removeAttribute("src"); }
  urlPreviewFrame.classList.remove("has");
  selectedRowId=null;
  render();
}
document.getElementById("urlClose").addEventListener("click", closeUrl);
document.addEventListener("mousedown",(e)=>{
  if(!urlPanel.classList.contains("open")) return;
  if(urlPanel.contains(e.target)) return;
  if(e.target.closest(".url-dot") || e.target.closest(".url-preview")) return;
  closeUrl();
});

/* URL の見た目を整える(https://, www. を取って短く) */
function prettyUrl(u){
  let s=String(u||"").trim();
  s=s.replace(/^https?:\/\//i,"").replace(/^www\./i,"").replace(/\/$/,"");
  return s;
}

/* =========================================================
   JSON 入出力
   ========================================================= */
function exportJSON(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
  const a=document.createElement("a"); const d=new Date();
  const s=d.getFullYear()+("0"+(d.getMonth()+1)).slice(-2)+("0"+d.getDate()).slice(-2);
  a.href=URL.createObjectURL(blob); a.download="comment-manager-"+s+".json"; a.click(); URL.revokeObjectURL(a.href);
}
function importJSON(file){
  const r=new FileReader();
  r.onload=()=>{ try{
    const data=JSON.parse(r.result);
    if(!data.records||!data.persons) throw new Error("Invalid format");
    if(!confirm("Replace current data with the imported file?")) return;
    db=Object.assign({persons:{},items:{},titles:{},notes:{},urls:{},records:[]}, data);
    db.records.forEach((r,i)=>{
      if(typeof r.done!=="boolean") r.done=false;
      if(typeof r.created!=="number") r.created = Date.now() - (db.records.length-i)*1000;
    });
    selectedRowId=null; closeAllPanels(); persist(); render(); alert("Imported.");
  }catch(e){ alert("Could not import: "+e.message); } };
  r.readAsText(file);
}
document.getElementById("btnExport").onclick=exportJSON;
document.getElementById("btnImport").onclick=()=>document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange=(e)=>{ if(e.target.files[0]) importJSON(e.target.files[0]); e.target.value=""; };

/* グループ化トグル(オンで名前ごとにまとめる) */
document.getElementById("groupToggle").addEventListener("change",(e)=>{
  viewMode = e.target.checked ? "byPerson" : "flat";
  if(viewMode==="byPerson") expandedGroups.clear();   // グループ表示にした時は全部閉じた状態から始める
  render();
});
/* 完了を隠す */
document.getElementById("hideDone").addEventListener("change",(e)=>{
  hideDone=e.target.checked; render();
});

/* 検索:入力で Name/Item/Title を絞り込み */
const searchInput=document.getElementById("searchInput");
const searchClear=document.getElementById("searchClear");
searchInput.addEventListener("input",()=>{
  searchQuery=searchInput.value.trim();
  searchClear.style.display = searchInput.value ? "" : "none";
  render();
});
searchInput.addEventListener("keydown",(e)=>{
  if(e.key==="Escape"){ searchInput.value=""; searchQuery=""; searchClear.style.display="none"; render(); searchInput.blur(); }
});
searchClear.addEventListener("click",()=>{
  searchInput.value=""; searchQuery=""; searchClear.style.display="none"; render(); searchInput.focus();
});

/* 行削除:選択行で Delete(本文編集中・メモ入力中は無効) */
document.addEventListener("keydown",(e)=>{
  if(e.key==="Delete" && selectedRowId && document.activeElement===document.body){
    if(confirm("Delete the selected row?")){
      db.records=db.records.filter(r=>r.id!==selectedRowId);
      selectedRowId=null; closeAllPanels(); gcMasters(); persist(); render();
    }
  }
});

/* 起動時は空の状態で描画(データは Firestore から読み込む) */
render();
showLoading("Loading…");   // データ取得中のローディング表示

/* 接続が一定時間つかない場合のフォールバック(初回スナップショット未達のまま) */
let firstSnapshotDone=false;
const connectTimeout=setTimeout(()=>{
  if(!firstSnapshotDone){
    showError("接続に時間がかかっています。通信環境を確認して再試行してください。");
  }
}, 15000);

/* クラウド同期の開始 */
let cloudStarted=false;
function startCloud(){
  if(cloudStarted) return;
  if(!(window.__cloud && window.__cloud.ready)) return;
  cloudStarted=true;

  window.__cloud.subscribe(
    (cloudData)=>{
      // Firestore を唯一のデータソースとして反映
      firstSnapshotDone=true;
      clearTimeout(connectTimeout);
      hideStatus();
      applyCloudData(cloudData || {});
    },
    (err)=>{
      // 購読中のエラー(権限不足・通信断など)
      clearTimeout(connectTimeout);
      let msg="データの取得に失敗しました。";
      if(err && err.code==="permission-denied"){
        msg="アクセスが拒否されました。Firestore のルールと匿名認証の設定を確認してください。";
      }
      showError(msg);
    }
  );
}
// サインイン失敗(匿名認証が無効など)
window.addEventListener("cloud-error",(e)=>{
  clearTimeout(connectTimeout);
  const phase = e.detail && e.detail.phase;
  if(phase==="auth"){
    showError("サインインに失敗しました。Firebase コンソールで Anonymous 認証が有効か確認してください。");
  } else {
    showError("接続に失敗しました。時間をおいて再試行してください。");
  }
});
// Firebase初期化が先に終わっていれば即開始、まだなら完了イベントを待つ
if(window.__cloud && window.__cloud.ready) startCloud();
window.addEventListener("cloud-ready", startCloud);
</script>
